services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  db:
    image: mariadb:11.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: progetto_links
      MYSQL_USER: Vincenzo
      MYSQL_PASSWORD: 123456
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} -e 'SELECT 1' >/dev/null 2>&1 || exit 1",
        ]
      start_period: 20s
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: always
    ports:
      - "5000:5000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: mysql+pymysql://Vincenzo:123456@db:3306/progetto_links

    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy

    volumes:
      - .:/app

  worker:
    build: .
    restart: always
    command: python worker.py
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: mysql+pymysql://Vincenzo:123456@db:3306/progetto_links
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  db_data:
