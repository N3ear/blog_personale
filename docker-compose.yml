services:
  db:
    image: mariadb:11.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: progetto_links
      MYSQL_USER: Vincenzo
      MYSQL_PASSWORD: 123456
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} -e 'SELECT 1' >/dev/null 2>&1 || exit 1",
        ]
      start_period: 20s
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: always
    ports:
      - "5000:5000"

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - .:/app

volumes:
  db_data:
